# Example inventory source pulling all three Akeyless secret types.
#
# - static-secret: a value stored in Akeyless that the user updates
#   manually. Returned as a string.
# - rotated-secret: a credential whose password Akeyless rotates on
#   schedule against the target system. Returned as a dict
#   {username, password}.
# - dynamic-secret: an ephemeral credential generated on each sync,
#   auto-revoked after a TTL. Returned as a dict (fields depend on
#   the producer; for a postgresql producer, expect
#   {id, password, ttl_in_minutes, user}).
#
# A customer Akeyless Gateway is required for rotated and dynamic
# reads. Configure it on the AWX credential's "Akeyless Gateway URL"
# field; the plugin uses it for data calls regardless of auth method.
# Static reads work whether or not a gateway is configured.

plugin: akeyless.awx_integration.akeyless

hosts:
  - app01.example.com
  - app02.example.com
default_group: prod_apps

# Discover everything under this prefix that matches secret_types.
secret_path_prefix: /apps/prod
secret_types:
  - static-secret
  - rotated-secret
  - dynamic-secret
