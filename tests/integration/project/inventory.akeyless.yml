# AWX inventory source for Akeyless, path-discovery mode.
# Auth (akeyless_api_url, access_id, cert_file, key_file) is injected by the
# AWX credential at job-run time. Do not put auth fields here.
plugin: akeyless.awx_integration.akeyless
secret_path_prefix: /apps/prod
hosts:
  - app01.example.com
  - app02.example.com
default_group: prod_apps
