---
version: 3
images:
  base_image:
    name: quay.io/ansible/awx-ee:latest
dependencies:
  galaxy:
    collections:
      - name: akeyless.secrets_management
        version: '>=1.0.0'
  python: requirements.txt
additional_build_files:
  - src: akeyless-awx_integration.tar.gz
    dest: configs
additional_build_steps:
  prepend_final:
    - LABEL org.opencontainers.image.source=https://github.com/Fahmy-Kadiri-akl/ansible-akeyless-awx
    - LABEL org.opencontainers.image.description="Akeyless AWX/AAP integration EE: ansible-core + akeyless.secrets_management + akeyless.awx_integration + akeyless Python SDK"
    - LABEL org.opencontainers.image.licenses=MIT
  prepend_base:
    - RUN ln -sf /usr/bin/python3.12 /usr/bin/python3
  append_galaxy:
    - COPY _build/configs/akeyless-awx_integration.tar.gz /tmp/
    - RUN ansible-galaxy collection install /tmp/akeyless-awx_integration.tar.gz --collections-path /usr/share/ansible/collections
    - RUN rm /tmp/akeyless-awx_integration.tar.gz
