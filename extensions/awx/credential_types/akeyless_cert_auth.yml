# Akeyless Cert-Auth Credential Type for AWX/AAP
#
# Paste the 'inputs' and 'injectors' blocks below into AWX:
#   System Administration -> Credential Types -> Add
# (or import via the awx.awx.credential_type Ansible module).
#
# Once registered, admins create credential instances of this type and
# attach them to inventory sources that use the
# akeyless.awx_integration.akeyless inventory plugin. The plugin reads
# everything it needs from environment variables and tempfile paths the
# injectors write at job-run time. Playbooks consume the resulting
# host_vars with no Akeyless code.
#
# IMPORTANT: this YAML is intended for direct paste into the AWX UI or
# for posting to /api/v2/credential_types/ as JSON. The injector values
# are written as plain Jinja (`{{ ... }}`). AWX evaluates them itself
# at job-run time. Do NOT wrap them in `{% raw %}` markers; AWX would
# store the literal text and the env vars would end up containing the
# string `{{ tower.filename.cert }}` instead of the tempfile path.
#
# tests/integration/awx-setup.yml inlines its own copy of these
# injectors and DOES wrap them in `{% raw %}` blocks. That copy is fed
# through Ansible (which evaluates Jinja during YAML parse), so the raw
# markers are required there to prevent local templating before the
# values are posted to AWX. The two files are intentionally different.

name: Akeyless (Cert Auth)
description: Authenticate to Akeyless with a client certificate. Consumed by the akeyless.awx_integration.akeyless inventory plugin.
kind: cloud

inputs:
  fields:
    - id: akeyless_api_url
      label: Akeyless API URL
      type: string
      default: https://api.akeyless.io
      help_text: Cert auth must hit the Akeyless control plane (https://api.akeyless.io). Customer gateways typically do not pass cert-auth payloads through their ingress.
    - id: akeyless_gateway_url
      label: Akeyless Gateway URL (optional)
      type: string
      help_text: Customer gateway URL, e.g. https://your-gateway.example.com:8000. Leave blank for static-secret-only inventories. Required when the inventory plugin is configured to read rotated or dynamic secrets, since those reads must terminate at the gateway. The auth handshake itself still terminates at the SaaS API URL above.
    - id: access_id
      label: Akeyless Access ID
      type: string
      help_text: The access ID of the cert auth method, e.g. p-XXXXXXXXXXXXXX
    - id: cert_data
      label: Client Certificate (PEM)
      type: string
      multiline: true
      help_text: PEM-encoded client certificate signed by the CA the auth method trusts.
    - id: key_data
      label: Client Private Key (PEM)
      type: string
      multiline: true
      secret: true
      help_text: PEM-encoded private key matching the client certificate.
  required:
    - akeyless_api_url
    - access_id
    - cert_data
    - key_data

injectors:
  env:
    AKEYLESS_API_URL: "{{ akeyless_api_url }}"
    AKEYLESS_GATEWAY_URL: "{{ akeyless_gateway_url | default('') }}"
    AKEYLESS_ACCESS_ID: "{{ access_id }}"
    AKEYLESS_ACCESS_TYPE: cert
    AKEYLESS_CERT_FILE: "{{ tower.filename.cert }}"
    AKEYLESS_KEY_FILE: "{{ tower.filename.key }}"
  file:
    template.cert: "{{ cert_data }}"
    template.key: "{{ key_data }}"
