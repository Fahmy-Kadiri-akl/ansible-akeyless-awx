name: Scan published EE image

on:
  schedule:
    # Daily at 13:00 UTC — independent of build cadence
    - cron: "0 13 * * *"
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tag: [latest]
    steps:
      - uses: actions/checkout@v6

      - name: Compute lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/akeyless-awx-ee" >> "$GITHUB_ENV"

      - name: Trivy scan ${{ matrix.tag }}
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE }}:${{ matrix.tag }}"
          format: sarif
          output: trivy-${{ matrix.tag }}.sarif
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true
          exit-code: "0"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-${{ matrix.tag }}.sarif
          category: ee-scan-${{ matrix.tag }}

      - name: Trivy table summary in job log
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.IMAGE }}:${{ matrix.tag }}"
          format: table
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true
          exit-code: "0"
